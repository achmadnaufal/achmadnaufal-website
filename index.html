<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Achmad Naufal</title>
    <meta name="description" content="Achmad Naufal.">
    <meta name="author" content="Achmad Naufal">
    <meta name="color-scheme" content="dark">
    <link rel="canonical" href="https://achmadnaufal.com">
    <meta property="og:title" content="Achmad Naufal">
    <meta property="og:url" content="https://achmadnaufal.com">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #050505;
            --fg: #eeeae0;
            --accent: #78ff8c;
            --muted: #6a6a66;
        }

        html, body { height: 100%; }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 13px;
            overflow: hidden;
            position: relative;
            min-height: 100svh;
            -webkit-font-smoothing: antialiased;
        }

        #field {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
        }

        .ui {
            position: fixed;
            inset: 0;
            z-index: 2;
            padding: clamp(1.25rem, 3.5vw, 2.25rem);
            display: grid;
            grid-template-rows: auto 1fr auto;
            pointer-events: none;
        }

        .ui > * { pointer-events: auto; }

        .bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.72rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .bar .mark {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
        }

        .bar .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2.6s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.25); }
        }

        .center {
            align-self: center;
            justify-self: center;
            text-align: center;
            color: var(--muted);
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            user-select: none;
            mix-blend-mode: difference;
            opacity: 0.9;
        }

        .center b {
            display: block;
            font-weight: 500;
            color: var(--fg);
            letter-spacing: 0.42em;
            font-size: 0.88rem;
            margin-top: 0.35rem;
        }

        .center small {
            display: block;
            margin-top: 0.9rem;
            font-size: 0.62rem;
            letter-spacing: 0.26em;
            opacity: 0.6;
        }

        footer.bar { align-items: end; }

        .links {
            display: flex;
            gap: 1.75rem;
            list-style: none;
            font-size: 0.78rem;
            letter-spacing: 0.22em;
        }

        .links a {
            color: var(--fg);
            text-decoration: none;
            position: relative;
            transition: color 180ms ease;
        }

        .links a::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: -5px;
            height: 1px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 260ms ease;
        }

        .links a:hover,
        .links a:focus-visible {
            color: var(--accent);
            outline: none;
        }

        .links a:hover::after,
        .links a:focus-visible::after {
            transform: scaleX(1);
        }

        .sig { letter-spacing: 0.24em; }

        @media (max-width: 560px) {
            .bar { font-size: 0.62rem; letter-spacing: 0.16em; }
            .center b { letter-spacing: 0.32em; font-size: 0.78rem; }
            .links { gap: 1.1rem; font-size: 0.68rem; letter-spacing: 0.18em; }
        }
    </style>
</head>
<body>
    <canvas id="field" aria-hidden="true"></canvas>

    <div class="ui">
        <header class="bar">
            <span class="mark"><span class="dot" aria-hidden="true"></span>achmadnaufal.com</span>
            <span>MMXXVI</span>
        </header>

        <div class="center">
            <span>/ move the cursor /</span>
            <b>&mdash;&nbsp;Achmad&nbsp;Naufal&nbsp;&mdash;</b>
            <small>a signature, nothing more</small>
        </div>

        <footer class="bar">
            <span class="sig">00 · field</span>
            <ul class="links" aria-label="Contact">
                <li><a href="mailto:achmadnaufal440@gmail.com">email</a></li>
                <li><a href="https://github.com/achmadnaufal" target="_blank" rel="noopener noreferrer">github</a></li>
            </ul>
        </footer>
    </div>

    <script>
    (() => {
        const canvas = document.getElementById('field');
        const ctx = canvas.getContext('2d');
        const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

        let W = 0, H = 0, DPR = 1;
        let dots = [];
        let mx = -1e4, my = -1e4, pressed = 0;

        const SPACING = 26;
        const RADIUS = 170;
        const MAX_PUSH = 22;

        const palette = {
            base: [70, 70, 68],
            hot: [120, 255, 140],
        };

        function resize() {
            DPR = Math.min(window.devicePixelRatio || 1, 2);
            W = innerWidth;
            H = innerHeight;
            canvas.width = W * DPR;
            canvas.height = H * DPR;
            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';
            ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
            buildDots();
        }

        function buildDots() {
            dots = [];
            const offsetX = (W % SPACING) / 2;
            const offsetY = (H % SPACING) / 2;
            for (let y = offsetY; y < H + SPACING; y += SPACING) {
                for (let x = offsetX; x < W + SPACING; x += SPACING) {
                    dots.push({
                        ox: x, oy: y,
                        x: x, y: y,
                        vx: 0, vy: 0,
                    });
                }
            }
        }

        function onMove(e) {
            const t = e.touches ? e.touches[0] : e;
            mx = t.clientX;
            my = t.clientY;
        }
        function onLeave() { mx = -1e4; my = -1e4; }

        addEventListener('pointermove', onMove, { passive: true });
        addEventListener('pointerleave', onLeave);
        addEventListener('touchmove', onMove, { passive: true });
        addEventListener('touchend', onLeave);
        addEventListener('pointerdown', () => { pressed = 1; });
        addEventListener('pointerup', () => { pressed = 0; });

        function mix(a, b, t) {
            return [
                a[0] + (b[0] - a[0]) * t,
                a[1] + (b[1] - a[1]) * t,
                a[2] + (b[2] - a[2]) * t,
            ];
        }

        function frame() {
            ctx.clearRect(0, 0, W, H);

            const r2 = RADIUS * RADIUS;
            const push = MAX_PUSH * (1 + pressed * 1.5);

            for (let i = 0; i < dots.length; i++) {
                const d = dots[i];
                const dx = d.x - mx;
                const dy = d.y - my;
                const dist2 = dx * dx + dy * dy;

                if (dist2 < r2 && dist2 > 0.001) {
                    const dist = Math.sqrt(dist2);
                    const f = (1 - dist / RADIUS);
                    const strength = f * f * push;
                    d.vx += (dx / dist) * strength * 0.06;
                    d.vy += (dy / dist) * strength * 0.06;
                }

                d.vx += (d.ox - d.x) * 0.045;
                d.vy += (d.oy - d.y) * 0.045;
                d.vx *= 0.82;
                d.vy *= 0.82;
                d.x += d.vx;
                d.y += d.vy;

                const disp = Math.hypot(d.x - d.ox, d.y - d.oy);
                const t = Math.min(1, disp / 40);
                const c = mix(palette.base, palette.hot, t);
                const alpha = 0.35 + t * 0.6;
                const size = 0.9 + t * 2.4;

                ctx.fillStyle = `rgba(${c[0] | 0},${c[1] | 0},${c[2] | 0},${alpha})`;
                ctx.beginPath();
                ctx.arc(d.x, d.y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(frame);
        }

        function staticRender() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = `rgba(${palette.base[0]},${palette.base[1]},${palette.base[2]},0.55)`;
            for (const d of dots) {
                ctx.beginPath();
                ctx.arc(d.x, d.y, 1, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        resize();
        addEventListener('resize', resize);

        if (reduce) {
            staticRender();
        } else {
            frame();
        }
    })();
    </script>
</body>
</html>
